name: House Prediction CI/CD
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Debug - List files
      run: |
        ls -la
        ls -la *.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # MAINTENANT ça marche !
    
    - name: Run Flask app test
      run: |
        pip install pytest flask
        pytest -v || echo "No tests, checking app.py"
        python app.py --help || echo "App OK"
    
    - name: Model prediction test
      run: |
        python house.py  # Ton script principal ?

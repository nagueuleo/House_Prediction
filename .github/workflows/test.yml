name: House Prediction Flask ML
on: 
  push :
    branches: ["main", "leo"]
  pull_request:
    branches: ["main", "leo"]
jobs:
  flask-ml-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    # Test spécifique à ton app.py
    - name: Test model loading (model1.pkl)
      run: |
        python -c "
        import pickle, numpy as np
        model = pickle.load(open('model1.pkl', 'rb'))
        print('✅ Model1 loaded:', type(model))
        test_input = np.array([[100, 3, 1]], dtype=np.float64)
        pred = model.predict(test_input)
        print('✅ Prediction OK:', pred[0])
        "
    
    - name: Test Flask app structure
      run: |
        python -c "
        from app import app
        with app.test_client() as client:
            response = client.get('/')
            assert response.status_code == 200
        print('✅ Flask routes OK')
        "
    
    - name: Verify dependencies
      run: |
        python -c "
        import flask, numpy, pickle
        print('✅ All imports OK')
        "
